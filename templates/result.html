<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="gradient-bg">

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        
        <!-- Result Card -->
        {% if prediction == 1 %}
        <div class="card result-card bg-success text-white shadow-lg border-0 rounded-4 fade-in-up" style="max-width: 500px; width: 100%;">
        {% elif prediction == 0 %}
        <div class="card result-card bg-danger text-white shadow-lg border-0 rounded-4 fade-in-up" style="max-width: 500px; width: 100%;">
        {% else %}
        <div class="card result-card bg-warning text-dark shadow-lg border-0 rounded-4 fade-in-up" style="max-width: 500px; width: 100%;">
        {% endif %}
            
            <div class="card-body text-center p-5">
                
                <div class="mb-4">
                    {% if prediction == 1 %}
                        <i class="fas fa-check-circle display-1 text-white opacity-75"></i>
                    {% elif prediction == 0 %}
                        <i class="fas fa-times-circle display-1 text-white opacity-75"></i>
                    {% else %}
                        <i class="fas fa-exclamation-triangle display-1 text-dark opacity-75"></i>
                    {% endif %}
                </div>
                
                <h2 class="card-title fw-bold mb-3">Prediction Result</h2>
                
                <div class="status-box p-4 rounded-3 mb-4 {{ 'bg-white bg-opacity-25' if prediction in [0,1] else 'bg-dark bg-opacity-10' }}">
                    <h3 class="fw-semibold mb-0">{{ status }}</h3>
                </div>
                
                <div class="d-grid gap-3">
                    <a href="/predict" class="btn btn-light btn-lg rounded-pill fw-bold text-dark shadow-sm">
                        <i class="fas fa-redo-alt me-2"></i> Predict Again
                    </a>
                    <a href="/" class="btn {{ 'btn-outline-light' if prediction in [0,1] else 'btn-outline-dark' }} btn-lg rounded-pill fw-bold shadow-sm">
                        <i class="fas fa-home me-2"></i> Home
                    </a>
                </div>

            </div>
        </div>
        
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
