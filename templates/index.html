<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Form</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="gradient-bg">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8">
                
                <div class="card shadow-lg border-0 rounded-4 glass-effect fade-in-up">
                    <div class="card-header bg-transparent border-0 text-center pt-5 pb-3">
                        <h2 class="fw-bold text-gradient">Application Details</h2>
                        <p class="text-muted">Please fill in the feature values below to get a prediction.</p>
                    </div>
                    
                    <div class="card-body px-5 pb-5">
                        <form action="/result" method="POST">
                            <div class="row g-4">
                                
                                {% for feature in features %}
                                <div class="col-md-6 col-lg-4">
                                    <div class="form-floating">
                                        <input type="number" step="any" class="form-control bg-light border-0 shadow-sm custom-input" id="{{ feature }}" name="{{ feature }}" placeholder="Enter {{ feature }}" required>
                                        <label for="{{ feature }}" class="text-muted"><i class="fas fa-chart-line me-1 text-primary"></i> {{ feature }}</label>
                                    </div>
                                </div>
                                {% endfor %}

                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top border-light">
                                <a href="/" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                                    <i class="fas fa-arrow-left me-2"></i> Back
                                </a>
                                <button type="submit" class="btn btn-primary rounded-pill animated-btn px-5 py-2 fw-semibold shadow">
                                    Predict Approval <i class="fas fa-check-circle ms-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
